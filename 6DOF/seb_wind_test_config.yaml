# seb_wind_test_config.yaml
# Single trial using Prospect 1 data with SEB-windmodel (ERA5 + Von Kármán)

simulation:
  type: 'Single Trial'
  dt: 0.05
  max_runtime: 120
  iterations_per_trial: 1

  recovery_sim: true
  launch_rail_length: 5.0
  launchrail_orientation: [0, 0, 1]

rocket:
  ORK_path: '6DOF/User-Reference-CSVs/'
  ORK_filename: 'p1ORK-6dof.csv'

  RasAero_path: '6DOF/User-Reference-CSVs/'
  RasAero_filename: 'p1ras-6dof.csv'

  reference_area: 0.03242927866  # m^2

recovery:
  CdA: [1.0, 10.0]
  deployment_altitude: [null, 500]

wind:
  type: SEB-windmodel
  data_path: 'december_07_2025_1300_at_35.35_-117.81/era5_wind_data.nc'
  lat: 35.35
  lon: -117.81
  surface_elev_m: 700.0   # Mojave ~700m MSL
  alt_max_m: 15000.0
  alt_dz_m: 50.0
  scale: 1.0
  n_modes: null            # auto (retain 95% variance)

record:
  - apogee
  - max_velocity
  - flight_time
