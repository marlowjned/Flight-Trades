# ============================
#  SAMPLE CONFIG FILE
# ============================

simulation:
  type: 'Trade'              # 'Trade' or 'Single Trial'
  dt: 0.05                   # timestep (s)
  max_runtime: 200           # max wall-clock runtime (s)
  iterations_per_trial: 10   # trials per permutation (varying wind seed)

  recovery_sim: true
  launch_rail_length: 5.0    # (m)
  launchrail_orientation: [0, 0, 1]


rocket:
  ORK_path: 'some/path/here/'
  ORK_filename: 'ProspectORK.csv'

  RasAero_path: 'another/one/'
  RasAero_filename: 'ProspectRas.csv'

  reference_area: 0.0  # m^2 — rocket cross-sectional area

  #OVERRIDE_mass: !linspace [8e4, 10e4, 10]


trade_study:
  blocks:
    - name: 'engine design'
      parameters:
        engine_mass: !linspace [20.0, 30.0, 10]
        thrust: !linspace [1000.0, 2000.0, 10]

    - name: 'fin sizing'
      parameters:
        height: !linspace [8.0, 16.0, 5]


recovery:
  CdA: [1, 2]
  deployment_altitude: [null, 2000]


wind:
  type: simple               # 'simple' or 'SEB-windmodel'
  magnitude: 5.0             # mean wind speed (m/s)
  direction: 0.0             # clockwise from north (rad)
  turbulence_intensity: 1.0  # noise std scale (0 = no turbulence, 1 = default)
  alt_min: 0.0               # lower bound of wind profile (m)
  alt_max: 10000.0           # upper bound of wind profile (m)
  alt_steps: 100             # number of altitude samples

# SEB-windmodel example:
# wind:
#   type: SEB-windmodel
#   data_path: './era5_cache/era5_2023_06_preprocessed.npz'
#   scale: 1.0
#   n_modes: null             # auto (retain 95% variance)


record:
  - apogee
  - max_velocity
  - flight_time
